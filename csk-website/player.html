<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Profile - Official Fan Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .profile-section {
            padding: 120px 5% 5rem;
            max-width: 1200px;
            margin: 0 auto;
            min-height: 80vh;
        }

        .profile-header {
            display: flex;
            gap: 3rem;
            background: var(--bg-secondary);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 3rem;
            margin-bottom: 3rem;
            align-items: center;
        }

        .profile-image {
            flex: 0 0 300px;
            height: 300px;
            border-radius: 50%;
            overflow: hidden;
            border: 5px solid var(--csk-yellow);
            box-shadow: 0 10px 30px var(--csk-yellow-glow);
        }

        .profile-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-info h1 {
            font-size: 3.5rem;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .profile-info h3 {
            color: var(--csk-yellow);
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            font-family: var(--font-body);
            font-weight: 400;
        }

        .profile-info p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 2rem;
        }

        .meta-details {
            display: flex;
            gap: 2rem;
        }

        .meta-item strong {
            display: block;
            color: var(--text-primary);
            margin-bottom: 0.2rem;
        }
        .meta-item span {
            color: var(--text-secondary);
        }

        .stats-container {
            background: var(--bg-secondary);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 3rem;
        }

        .stats-container h2 {
            margin-bottom: 2rem;
            color: var(--csk-yellow);
            font-size: 2rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 2rem;
        }

        .stat-box {
            background: var(--bg-primary);
            padding: 1.5rem;
            border-radius: 10px;
            text-align: center;
            border: 1px solid var(--glass-border);
        }

        .stat-box span {
            display: block;
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .stat-box strong {
            display: block;
            font-size: 2.5rem;
            color: var(--text-primary);
            font-family: var(--font-heading);
        }

        .error-message {
            text-align: center;
            padding: 100px 0;
            font-size: 2rem;
            color: var(--text-secondary);
        }

        @media (max-width: 768px) {
            .profile-header {
                flex-direction: column;
                text-align: center;
                padding: 2rem;
            }
            .meta-details {
                justify-content: center;
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar scrolled" id="main-nav">
        <div class="nav-container">
            <div class="logo">
                <a href="index.html"><h1>CSK <span class="highlight">HUB</span></h1></a>
            </div>
            <img src="https://www.chennaisuperkings.com/assets/images/csk_logo_withOutGradient.png" alt="CSK Logo" class="center-logo">
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#news">Latest News</a></li>
                <li><a href="schedule.html">Schedule</a></li>
                <li><a href="roster.html" class="active">Team</a></li>
                <li><a href="stats.html">Stats</a></li>
                <li><a href="index.html#fanzone">Fan Zone</a></li>
            </ul>
            <div class="mobile-menu-btn" id="mobile-menu-btn">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
    </nav>

    <!-- Content rendered via JS -->
    <div id="profile-content"></div>

    <footer class="footer">
        <div class="footer-container">
            <div class="social-icons">
                <a href="https://twitter.com/chennaiipl" class="icon-circle" target="_blank"><i class="fab fa-twitter"></i></a>
                <a href="https://www.instagram.com/chennaiipl" class="icon-circle" target="_blank"><i class="fab fa-instagram"></i></a>
                <a href="https://www.youtube.com/@iabhinavsinghrajput" class="icon-circle" target="_blank"><i class="fab fa-youtube"></i></a>
            </div>
            <div class="footer-copyright">
                &copy; 2026 All Rights Reserved by CSK HUB
            </div>
            <div class="footer-links">
                <a href="term.html">Terms & conditions</a> | 
                <a href="contact.html">Contact</a> | 
                <a href="privacy.html">Privacy Policy</a>
            </div>
        </div>
    </footer>

    <!-- Load Data and Render -->
    <script src="data.js"></script>
    <script>
        // Get player ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const playerId = urlParams.get('id');
        const container = document.getElementById('profile-content');

        const player = window.cskData.players[playerId];

        if (player) {
            document.title = `${player.name} Profile - CSK Hub`;
            
            // Build stats grid dynamically based on player role
            let statsHtml = '';
            for (const [key, value] of Object.entries(player.stats)) {
                // Format key (e.g., 'highScore' to 'High Score')
                const formattedKey = key.replace(/([A-Z])/g, ' $1').trim();
                statsHtml += `
                    <div class="stat-box animate-up">
                        <span>${formattedKey}</span>
                        <strong>${value}</strong>
                    </div>
                `;
            }

            container.innerHTML = `
                <section class="profile-section">
                    <div class="profile-header animate-in">
                        <div class="profile-image">
                            <img src="${player.image}" alt="${player.name}">
                        </div>
                        <div class="profile-info">
                            <h1>${player.name}</h1>
                            <h3>${player.role}</h3>
                            <p>${player.bio}</p>
                            <div class="meta-details">
                                <div class="meta-item">
                                    <strong>Batting</strong>
                                    <span>${player.battingStyle}</span>
                                </div>
                                <div class="meta-item">
                                    <strong>Bowling</strong>
                                    <span>${player.bowlingStyle}</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="stats-container animate-up delay-1">
                        <h2>IPL Career Statistics</h2>
                        <div class="stats-grid">
                            ${statsHtml}
                        </div>
                    </div>
                </section>
            `;
        } else {
            container.innerHTML = `
                <div class="error-message">
                    <p>Player not found.</p>
                    <a href="roster.html" class="btn btn-primary" style="margin-top: 2rem;">Back to Roster</a>
                </div>
            `;
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
