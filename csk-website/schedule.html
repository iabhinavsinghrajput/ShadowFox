<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Schedule - Official Fan Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .page-header {
            padding: 120px 5% 3rem;
            text-align: center;
            background: linear-gradient(135deg, var(--bg-primary) 0%, #111 100%);
            border-bottom: 1px solid var(--glass-border);
        }
        .page-header h1 {
            font-size: 3rem;
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar scrolled" id="main-nav">
        <div class="nav-container">
            <div class="logo">
                <a href="index.html"><h1>CSK <span class="highlight">HUB</span></h1></a>
            </div>
            <img src="https://www.chennaisuperkings.com/assets/images/csk_logo_withOutGradient.png" alt="CSK Logo" class="center-logo">
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#news">Latest News</a></li>
                <li><a href="schedule.html" class="active">Schedule</a></li>
                <li><a href="roster.html">Team</a></li>
                <li><a href="index.html#fanzone">Fan Zone</a></li>
            </ul>
            <div class="mobile-menu-btn" id="mobile-menu-btn">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
    </nav>

    <!-- Header -->
    <header class="page-header">
        <h1>IPL 2026 <span class="highlight">Schedule</span></h1>
        <p>Complete list of fixtures and recent results.</p>
    </header>

    <!-- Schedule Container -->
    <section class="schedule-section" style="min-height: 60vh;">
        <div class="schedule-container" id="full-schedule">
            <!-- Rendered via JS -->
        </div>
    </section>

    <footer class="footer">
        <div class="footer-container">
            <div class="social-icons">
                <a href="https://twitter.com/chennaiipl" class="icon-circle" target="_blank"><i class="fab fa-twitter"></i></a>
                <a href="https://www.instagram.com/chennaiipl" class="icon-circle" target="_blank"><i class="fab fa-instagram"></i></a>
                <a href="https://www.youtube.com/user/chennaisuperkings" class="icon-circle" target="_blank"><i class="fab fa-youtube"></i></a>
            </div>
            <div class="footer-copyright">
                &copy; 2026 All Rights Reserved by CSK HUB
            </div>
            <div class="footer-links">
                <a href="#">Terms & conditions</a> | 
                <a href="#">Contact</a> | 
                <a href="#">Privacy Policy</a>
            </div>
        </div>
    </footer>

    <!-- Load Data and Render -->
    <script src="data.js"></script>
    <script>
        const scheduleContainer = document.getElementById('full-schedule');
        
        window.cskData.schedule.forEach(match => {
            const card = document.createElement('div');
            card.className = `match-card animate-up ${match.status.toLowerCase()}`;
            
            let statusHtml = '';
            if (match.status === 'Result') {
                card.innerHTML = `
                    <div class="match-date">${match.date} <span>${match.venue}</span></div>
                    <div class="match-teams">
                        <div class="team"><strong>CSK</strong> ${match.cskScore}</div>
                        <div class="vs">vs</div>
                        <div class="team"><strong>${match.opponent}</strong> ${match.oppScore}</div>
                    </div>
                    <div class="match-status highlight">${match.result}</div>
                `;
            } else {
                card.innerHTML = `
                    <div class="match-date">${match.date} <span>${match.venue}</span></div>
                    <div class="match-teams">
                        <div class="team"><strong>CSK</strong></div>
                        <div class="vs">vs</div>
                        <div class="team"><strong>${match.opponent}</strong></div>
                    </div>
                    <div class="match-status">${match.time}</div>
                    <button class="btn btn-secondary btn-small">Get Tickets</button>
                `;
            }
            
            scheduleContainer.appendChild(card);
        });
    </script>
    <script src="script.js"></script>
</body>
</html>
