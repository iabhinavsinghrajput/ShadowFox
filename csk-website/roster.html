<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSK Squad - Official Fan Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .page-header {
            padding: 120px 5% 3rem;
            text-align: center;
            background: linear-gradient(135deg, var(--bg-primary) 0%, #111 100%);
            border-bottom: 1px solid var(--glass-border);
        }
        .page-header h1 {
            font-size: 3rem;
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar scrolled" id="main-nav">
        <div class="nav-container">
            <div class="logo">
                <a href="index.html"><h1>CSK <span class="highlight">HUB</span></h1></a>
            </div>
            <img src="https://www.chennaisuperkings.com/assets/images/csk_logo_withOutGradient.png" alt="CSK Logo" class="center-logo">
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="news.html">Latest News</a></li>
                <li><a href="schedule.html">Schedule</a></li>
                <li><a href="roster.html" class="active">Team</a></li>
                <li><a href="stats.html">Stats</a></li>
                <li><a href="index.html#fanzone">Fan Zone</a></li>
            </ul>
            <div class="mobile-menu-btn" id="mobile-menu-btn">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
    </nav>

    <!-- Header -->
    <header class="page-header">
        <h1>CSK Squad <span class="highlight">2026</span></h1>
        <p>Meet the champions defending the den.</p>
    </header>

    <!-- Roster Grid -->
    <section class="roster-section" style="min-height: 60vh;">
        <div class="roster-grid" id="full-roster">
            <!-- Rendered via JS -->
        </div>
    </section>

    <footer class="footer">
        <div class="footer-container">
            <div class="social-icons">
                <a href="https://twitter.com/chennaiipl" class="icon-circle" target="_blank"><i class="fab fa-twitter"></i></a>
                <a href="https://www.instagram.com/chennaiipl" class="icon-circle" target="_blank"><i class="fab fa-instagram"></i></a>
                <a href="https://www.youtube.com/@iabhinavsinghrajput" class="icon-circle" target="_blank"><i class="fab fa-youtube"></i></a>
            </div>
            <div class="footer-copyright">
                &copy; 2026 All Rights Reserved by CSK HUB
            </div>
            <div class="footer-links">
                <a href="term.html">Terms & conditions</a> | 
                <a href="contact.html">Contact</a> | 
                <a href="privacy.html">Privacy Policy</a>
            </div>
        </div>
    </footer>

    <!-- Load Data and Render -->
    <script src="data.js"></script>
    <script>
        const rosterContainer = document.getElementById('full-roster');
        
        // Loop through cskData and render
        Object.values(window.cskData.players).forEach(player => {
            const card = document.createElement('a');
            card.href = `player.html?id=${player.id}`;
            card.className = 'player-card animate-up';
            
            card.innerHTML = `
                <div class="player-img">
                    <img src="${player.image}" alt="${player.name}">
                    <div class="role-badge">${player.role}</div>
                </div>
                <div class="player-info">
                    <h3>${player.name}</h3>
                    <p>Click to view profile &rarr;</p>
                </div>
            `;
            rosterContainer.appendChild(card);
        });
    </script>
    <script src="script.js"></script>
</body>
</html>
